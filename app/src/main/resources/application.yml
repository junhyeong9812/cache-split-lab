server:
  port: 8080
  tomcat:
    threads:
      # ★ arm 간 총 스레드 고정 (DECISIONS.md §17)
      # A 는 1노드가 THREADS_TOTAL, B/C 는 2노드가 절반씩 → 총 동시성 상수.
      # CPU 리밋만으로는 부족하다 — origin 에서 블로킹하는 스레드는 CPU 를 안 쓴다.
      # Phase 0 에서 뭐가 묶이는지(CPU/스레드) 재고 최종 확정한다.
      max: ${THREADS_MAX:200}

spring:
  application:
    name: cache-split-app

app:
  node-id: ${NODE_ID:node-1}
  cache:
    # ★ arm 을 가르는 앱 파라미터. 기본값 없음 — 미설정 시 기동 실패가 의도다.
    capacity: ${CACHE_CAPACITY}
    # local(인메모리 — A/B/C, 기본) | redis(공유 — arm D). 오타는 기동 실패.
    mode: ${CACHE_MODE:local}
  origin:
    base-url: ${ORIGIN_URL:http://origin:9090}
  redis:
    # arm D 전용 — mode=redis 일 때만 접속한다.
    uri: ${REDIS_URI:redis://redis:6379}

logging:
  level:
    root: WARN
    dev.jun.cachesplit: INFO
