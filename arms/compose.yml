# ─────────────────────────────────────────────────────────────────────────
# 세 arm 이 공유하는 단 하나의 compose 파일.
#
# arm 을 바꾸는 방법 = env 파일을 바꾸는 것뿐이다:
#   arm A → --env-file arms/a-single/arm.env      (노드 1개)
#   arm B → --env-file arms/b-roundrobin/arm.env  (노드 2개, 라운드로빈)
#   arm C → --env-file arms/c-keyhash/arm.env     (노드 2개, 키 해시)
#
# 왜 compose 를 arm 마다 복사하지 않았나:
#   B 와 C 는 nginx upstream 파일 한 줄만 다르다. 세 벌을 복사해두면
#   언젠가 하나만 고쳐지고, 그러면 "arm 간 차이는 배치뿐"이라는 최상위
#   불변식이 조용히 깨진다. 조용히 깨진 불변식은 조용히 틀린 숫자를 만든다.
#   파일이 하나면 구조적으로 갈라질 수가 없다.
#
# 실행: scripts/run-arm.sh 가 총량에서 노드당 값을 계산해 주입한다.
#       (CACHE_TOTAL → A: N / B,C: N/2,  CPU_TOTAL → A: 전부 / B,C: 절반)
#       compose 를 직접 부르면 아래 :? 가드에 걸려 즉시 실패한다 — 의도적이다.
#       빠뜨린 캐시 크기가 기본값으로 조용히 채워지면 실험이 통째로 거짓말이 된다.
# ─────────────────────────────────────────────────────────────────────────

name: cache-split-${ARM_ID:?ARM_ID 미설정 — arms/<arm>/arm.env 를 --env-file 로 지정하세요}

# 두 앱 노드가 공유하는 설정. 노드별로 다른 것은 NODE_ID 하나뿐이다.
x-app: &app
  build:
    context: ../app
  environment: &app-env
    CACHE_CAPACITY: ${APP_CACHE_CAPACITY:?노드당 캐시 엔트리 수 미설정 — scripts/run-arm.sh 로 실행하세요}
    ORIGIN_URL: http://origin:9090
  # 총 자원 고정: A 는 1 노드가 CPU_TOTAL 을, B/C 는 2 노드가 절반씩 나눠 갖는다.
  # 이래야 "같은 자원을 어떻게 배치하느냐"만 변수로 남는다.
  cpus: ${APP_CPUS:?노드당 CPU 미설정 — scripts/run-arm.sh 로 실행하세요}
  # 캐시는 엔트리 개수로 강제되므로(ARCHITECTURE §3) 이 리밋은 메커니즘이 아니라
  # 안전망이다. 여기 걸리면 그건 결과가 아니라 버그다.
  mem_limit: ${APP_MEM:?노드당 메모리 미설정 — scripts/run-arm.sh 로 실행하세요}
  depends_on:
    origin:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "wget", "-qO-", "http://localhost:8080/admin/stats"]
    interval: 2s
    timeout: 2s
    retries: 30

services:
  origin:
    build:
      context: ../origin
    environment:
      DELAY_MS: ${ORIGIN_DELAY_MS:?미스 페널티 미설정 — scripts/run-arm.sh 로 실행하세요}
      CSV_PATH: /data/dataset.csv
    volumes:
      - ../data:/data:ro
    # origin 은 측정 대상이 아니다. 넉넉히 줘서 origin 자신이 병목이 되지 않게 한다 —
    # origin 이 밀리면 미스 페널티가 "우리가 정한 값"이 아니게 되고, 그 순간
    # 파라미터여야 할 것이 측정 대상으로 변한다.
    cpus: ${ORIGIN_CPUS:?origin CPU 미설정 — scripts/run-arm.sh 로 실행하세요}
    mem_limit: ${ORIGIN_MEM:?origin 메모리 미설정 — scripts/run-arm.sh 로 실행하세요}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/admin/stats"]
      interval: 2s
      timeout: 2s
      retries: 30

  app-1:
    <<: *app
    environment:
      <<: *app-env
      NODE_ID: app-1
    ports:
      # 노드별 /admin/stats · /admin/cache/keys 를 직접 긁기 위한 포트.
      # nginx 를 통하면 어느 노드가 답했는지 통제할 수 없어서 스모킹 건을 못 잡는다.
      - "8081:8080"

  app-2:
    <<: *app
    environment:
      <<: *app-env
      NODE_ID: app-2
    ports:
      - "8082:8080"
    # arm A 에는 이 노드가 없다. profile 이 없는 A 는 app-2 를 아예 안 띄운다.
    profiles: ["two-node"]

  nginx:
    image: nginx:1.27-alpine
    volumes:
      # 공통 설정 — 세 arm 이 그대로 공유한다.
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # ★ arm 간 유일한 차이. 이 한 줄이 이 프로젝트의 실험 변수 전부다.
      - ../nginx/upstream/${ARM_UPSTREAM_CONF:?upstream 설정 미지정}:/etc/nginx/conf.d/upstream.conf:ro
      - ../results/${ARM_ID}/nginx:/var/log/nginx
    ports:
      - "80:80"
    depends_on:
      app-1:
        condition: service_healthy
