# ─────────────────────────────────────────────────────────────────────────
# 공통 nginx 설정 — 세 arm 이 이 파일을 그대로 공유한다.
#
# arm 간에 다른 것은 오직 하나: conf.d/upstream.conf 에 무엇이 마운트되는가.
#   arm A → upstream/arm-a.conf  (노드 1개)
#   arm B → upstream/arm-b.conf  (노드 2개, 라운드로빈)
#   arm C → upstream/arm-c.conf  (노드 2개, 키 해시)
#
# 이 구조가 "arm 간 차이는 배치뿐"이라는 최상위 불변식을 강제한다.
# server 블록·프록시 설정·로그 포맷을 arm 별로 복사하면 그 순간 실험이 무효가 된다.
# ─────────────────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 8192;
}

http {
    # ── 로그 ──────────────────────────────────────────────────────────
    # $upstream_addr 이 핵심이다. 어느 노드가 응답했는지를 기록해야
    # "노드별 요청 분포"를 잴 수 있고, 그게 arm C 의 핫키 쏠림을 드러낸다.
    # 이게 없으면 C 의 대가를 측정할 방법이 없다.
    #
    # $upstream_response_time = 앱 노드가 쓴 시간
    # $request_time           = 그 + nginx 오버헤드 + 네트워크
    log_format arm escape=none
        '$time_iso8601\t'
        '$request_uri\t'
        '$upstream_addr\t'
        '$status\t'
        '$request_time\t'
        '$upstream_response_time';

    # buffer/flush 없이 매 요청 디스크에 쓰면 고부하에서 nginx 자신이 병목이 된다.
    # 측정 대상은 앱이지 로거가 아니다.
    access_log /var/log/nginx/access.log arm buffer=256k flush=1s;
    error_log  /var/log/nginx/error.log warn;

    # ── 성능 기본값 (arm 무관 상수) ────────────────────────────────────
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;

    # ── arm 별 교체 지점 — 유일한 변수 ─────────────────────────────────
    include /etc/nginx/conf.d/upstream.conf;

    server {
        listen 80 default_server;
        server_name _;

        # 실험 트래픽. k6 가 때리는 유일한 경로.
        location /key/ {
            proxy_pass http://app_pool;

            # upstream keepalive 를 실제로 쓰려면 HTTP/1.1 + Connection 비우기가 필요하다.
            # 이게 없으면 요청마다 TCP 를 새로 열어서 지연에 커넥션 비용이 섞인다.
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

            # 벤치는 조용히 실패하면 안 된다. 늘어지는 것보다 빨리 터지는 게 낫다.
            proxy_connect_timeout 1s;
            proxy_send_timeout    5s;
            proxy_read_timeout    5s;

            # 재시도는 끈다. nginx 가 몰래 다른 노드로 재시도하면
            # arm C 의 "같은 키는 항상 같은 노드" 불변식이 깨지고,
            # 미스 횟수도 부풀려져 히트율이 오염된다.
            proxy_next_upstream off;

            # 게이트웨이 캐싱은 이 실험의 대상이 아니다. 명시적으로 끈다.
            # (nginx 는 proxy_cache 를 설정하지 않으면 기본적으로 캐싱하지 않지만,
            #  "의도적으로 안 켰다"를 코드에 남긴다.)
        }

        # nginx 자신의 헬스체크. 실험 트래픽 아님.
        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }
    }
}
