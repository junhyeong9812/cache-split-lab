# ── arm A — a-single ─────────────────────────────────────────────────────
# 1 노드 × 캐시 N.  자(ruler) — 캐시를 쪼개지 않았을 때의 천장.
#
# 분산할 게 없는데도 nginx 를 거친다.
# A 만 nginx 를 건너뛰면 A 는 네트워크 홉 하나를 공짜로 아끼게 되고,
# 그러면 측정된 차이가 "캐시 효과"인지 "LB 비용"인지 분리가 안 된다.
# 홉을 상수로 고정해야 배치만 변수로 남는다.
# ─────────────────────────────────────────────────────────────────────────

upstream app_pool {
    server app-1:8080 max_fails=0;

    # 상수 — arm-b/arm-c 와 반드시 동일해야 한다.
    # 커넥션 재사용 정책이 arm 마다 다르면 지연 비교가 오염된다.
    keepalive 64;
}
