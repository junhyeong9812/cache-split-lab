# ── arm B — b-roundrobin ─────────────────────────────────────────────────
# 2 노드 × 캐시 N/2, 라운드로빈.  함정.
#
# 라운드로빈은 nginx 의 기본 정책이라 지시어가 따로 없다 (서버만 나열하면 됨).
#
# 무슨 일이 일어나는가:
#   요청이 키와 무관하게 1번, 2번, 1번, 2번… 번갈아 간다
#     → 두 노드가 각자 "전체 키 공간"을 본다
#     → 각자 LRU 로 가장 뜨거운 N/2 개를 남긴다
#     → 둘이 같은 트래픽 분포를 보므로 같은 키를 캐싱한다
#     → 유효 캐시 = N/2.  나머지 N/2 는 복제본이다.
#
# 이게 낭비인지 기능인지는 접근 분포(Zipf s)가 정한다 — docs/GLOSSARY.md §4.
# ─────────────────────────────────────────────────────────────────────────

upstream app_pool {
    server app-1:8080 max_fails=0;
    server app-2:8080 max_fails=0;

    # 상수 — arm-a/arm-c 와 반드시 동일해야 한다.
    keepalive 64;
}
