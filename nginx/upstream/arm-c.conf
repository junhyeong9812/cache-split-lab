# ── arm C — c-keyhash ────────────────────────────────────────────────────
# 2 노드 × 캐시 N/2, 키 해시.  해소 — 그리고 그 대가.
#
# 무슨 일이 일어나는가:
#   hash($uri) % 2 로 목적지가 결정된다 → 같은 키는 항상 같은 노드
#     → 각 노드가 "자기 몫 키만" 본다
#     → 중복 없음 → 유효 캐시 = N (온전히 씀)
#
# 대가:
#   뜨거운 키 하나가 트래픽의 30% 를 먹으면 그 키를 담당하는 노드 한 대가
#   30% 를 혼자 받는다. 라운드로빈이면 고르게 흩어졌을 부하다.
#   Zipf s 가 높을수록 이 쏠림이 심해진다.
#
#   → 캐시 이득(s 낮을 때 큼)과 부하 쏠림 손해(s 높을 때 큼)가 정반대로 움직인다.
#     그 교차점을 찾는 게 이 프로젝트의 산출물이다.
# ─────────────────────────────────────────────────────────────────────────

upstream app_pool {
    # $uri 를 쓴다 ($request_uri 아님).
    # $request_uri 는 쿼리스트링을 포함해서, 나중에 파라미터가 하나라도 붙으면
    # 같은 키가 다른 노드로 가버린다 → "같은 키 = 같은 노드" 불변식이 깨진다.
    # $uri 는 /key/42 로 경로만 남아 키와 1:1 이다.
    #
    # `consistent` 를 붙이지 않았다 = modulo 방식.
    # 노드 수가 2 로 고정이므로 이걸로 충분하다.
    # consistent hashing 은 노드 수가 "변할 때"의 재배치 폭풍(2→3 대면 키의 2/3 가
    # 이사)을 막는 도구인데, 우리는 실행 중 노드 수를 바꾸지 않는다.
    # 붙이면 vnode 때문에 분할이 정확히 반반이 아니게 되어 노이즈만 생긴다.
    # (실무가 왜 consistent 를 쓰는지는 docs/GLOSSARY.md §5 에 기록)
    hash $uri;

    server app-1:8080 max_fails=0;
    server app-2:8080 max_fails=0;

    # 상수 — arm-a/arm-b 와 반드시 동일해야 한다.
    keepalive 64;
}
