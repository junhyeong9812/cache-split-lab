# ── arm D — d-redis ──────────────────────────────────────────────────────
# 라우팅은 arm B 와 동일한 라운드로빈이다 — 그래야 "캐시를 밖으로 뺐다"만 변수로 남는다.
# (arm B 와 비교하면 인메모리 중복 vs 외부 공유, arm A 와 비교하면 스케일업 vs 외부화.)
#
# 캐시가 하나라 어느 노드가 받든 같은 캐시를 본다 — B 의 중복 함정도, C 의 쏠림
# 함정도 없다. 대신 모든 요청이 redis 단일 스레드를 거친다. 그 대가를 재는 arm 이다.
# ─────────────────────────────────────────────────────────────────────────

upstream app_pool {
    server app-1:8080 max_fails=0;
    server app-2:8080 max_fails=0;

    # 상수 — arm-a/b/c 와 반드시 동일해야 한다.
    keepalive 64;
}
